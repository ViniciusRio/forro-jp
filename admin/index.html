<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Forró JP</title>
</head>
  
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
  var params = new URLSearchParams(window.location.search);
  var hash = window.location.hash;
  if (params.get('invite_token') || params.get('confirmation_token') || params.get('recovery_token') || (hash && hash.includes('invite_token'))) {
    window.location.href = '/admin/' + window.location.search + window.location.hash;
  }
</script>
</body>
</html>
