backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

locale: "pt"

collections:
  - name: "agenda"
    label: "Agenda"
    files:
      - name: "agenda"
        label: "Agenda Semanal"
        file: "agenda.json"
        format: json
        fields:
          - label: "Última atualização"
            name: "ultima_atualizacao"
            widget: "datetime"
            format: "YYYY-MM-DD"
            date_format: "DD/MM/YYYY"
            time_format: false

          - label: "Dias da semana"
            name: "dias"
            widget: "list"
            fields:
              - label: "ID do dia"
                name: "id"
                widget: "hidden"
              - label: "Dia"
                name: "label"
                widget: "string"
              - label: "Eventos"
                name: "eventos"
                widget: "list"
                summary: "{{fields.nome}} — {{fields.bairro}}"
                fields:
                  - label: "Nome do evento"
                    name: "nome"
                    widget: "string"
                  - label: "Local"
                    name: "local"
                    widget: "string"
                  - label: "Bairro"
                    name: "bairro"
                    widget: "string"
                  - label: "Instagram (link completo)"
                    name: "instagram"
                    widget: "string"
                    required: false
                  - label: "Frequência (ex: 1ª sexta do mês)"
                    name: "frequencia"
                    widget: "string"
                    required: false

          - label: "Lugares variáveis"
            name: "variaveis"
            widget: "list"
            summary: "{{fields.nome}}"
            fields:
              - label: "Nome"
                name: "nome"
                widget: "string"
              - label: "Bairro"
                name: "bairro"
                widget: "string"
              - label: "Dias"
                name: "dias"
                widget: "string"
              - label: "Instagram"
                name: "instagram"
                widget: "string"
                required: false

          - label: "Outros lugares"
            name: "outros"
            widget: "list"
            summary: "{{fields.nome}}"
            fields:
              - label: "Nome"
                name: "nome"
                widget: "string"
              - label: "Bairro"
                name: "bairro"
                widget: "string"
